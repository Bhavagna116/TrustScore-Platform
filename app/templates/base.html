<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Multi-Source Data Scraping and Trust Scoring Platform - Analyze content credibility from blogs, YouTube, and PubMed">
  <title>{% block title %}Trust Score Platform{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-icon">🔍</span>
      <span class="nav-title">TrustScore<span class="brand-accent">AI</span></span>
    </div>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Dashboard</a>
      <a href="/api/sources" class="nav-link" target="_blank">API</a>
    </div>
    <div class="nav-badge">
      <span class="badge-dot"></span>
      Live Data
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>TrustScore AI &mdash; Multi-Source Data Scraping & Trust Scoring Platform &copy; 2025</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
