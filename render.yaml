services:
  - type: web
    name: trustscore-ai
    env: python
    buildCommand: pip install -r requirements.txt && python -c "import nltk; nltk.download('punkt'); nltk.download('stopwords'); nltk.download('punkt_tab')"
    startCommand: gunicorn app.routes:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
    disk:
      name: data
      mountPath: /opt/render/project/src/output
      sizeGB: 1
